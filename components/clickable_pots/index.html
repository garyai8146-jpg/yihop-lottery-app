<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: sans-serif;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      padding: 0;
      margin: 0;
      overflow: hidden;
      border-radius: 8px;
      border: 3px solid rgba(255, 248, 223, .95);
      background: #130d09;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .35);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .card img {
      width: 100%;
      height: 108%;
      display: block;
      object-fit: cover;
      transform: translateY(-4%);
      pointer-events: none;
    }
    .card:hover {
      filter: saturate(1.08) brightness(1.04);
      box-shadow: 0 14px 30px rgba(0, 0, 0, .42), inset 0 0 0 2px rgba(255, 255, 255, .2);
    }
    .card:active {
      filter: brightness(1.16) saturate(1.18);
      transform: scale(.98);
    }
    .card.opening {
      pointer-events: none;
      animation: pulse .75s ease-in-out infinite alternate;
    }
    .grid.busy .card {
      cursor: wait;
      filter: brightness(.55) saturate(.75);
    }
    .grid.busy .card.opening {
      filter: brightness(1) saturate(1.08);
    }
    .card.opening::after {
      content: "開鍋中...";
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff7d8;
      font-size: 1.55rem;
      font-weight: 950;
      letter-spacing: .12em;
      text-shadow: 0 3px 8px rgba(0, 0, 0, .5);
      background: rgba(116, 24, 18, .32);
      backdrop-filter: blur(1px);
    }
    @keyframes pulse {
      to { transform: scale(.97); box-shadow: 0 0 38px rgba(255, 205, 105, .55); }
    }
  </style>
</head>
<body>
  <div id="root" class="grid"></div>
  <script>
    const root = document.getElementById("root");
    let locked = false;

    function post(type, payload) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
    }

    function setFrameHeight() {
      post("streamlit:setFrameHeight", { height: document.documentElement.scrollHeight });
    }

    function setComponentValue(value) {
      post("streamlit:setComponentValue", { value, dataType: "json" });
    }

    function render(args) {
      const images = args.images || [];
      const names = args.names || [];
      locked = false;
      root.classList.remove("busy");
      root.innerHTML = "";
      images.forEach((src, index) => {
        const button = document.createElement("button");
        button.className = "card";
        button.type = "button";
        button.setAttribute("aria-label", `抽 ${names[index] || `第 ${index + 1} 鍋`}`);

        const image = document.createElement("img");
        image.src = src;
        image.alt = names[index] || "";
        button.appendChild(image);

        button.addEventListener("click", () => {
          if (locked) return;
          locked = true;
          setComponentValue({ index, nonce: Date.now() });
          root.classList.add("busy");
          button.classList.add("opening");
          setTimeout(() => {
            if (!locked) return;
            locked = false;
            root.classList.remove("busy");
            root.querySelectorAll("button").forEach((item) => {
              item.classList.remove("opening");
            });
          }, 4000);
        });
        root.appendChild(button);
      });
      requestAnimationFrame(setFrameHeight);
    }

    window.addEventListener("message", (event) => {
      if (event.data.type === "streamlit:render") {
        render(event.data.args || {});
      }
    });

    post("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>
